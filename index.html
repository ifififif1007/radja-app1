<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radja Ultra Cloud</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5761/5761803.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Plus+Jakarta+Sans:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --android-slate: #0f172a; --neon-lime: #39FF14; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--android-slate); color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }
        .font-radja { font-family: 'Bangers', cursive; background: linear-gradient(to right, #FF8C00, #ff007f, #39FF14); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-mobile { background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,1)), url('https://images.unsplash.com/photo-1601362840469-51e4d8d59085?auto=format&fit=crop&q=80&w=600'); background-size: cover; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px solid var(--neon-lime); }
        .glass-nav { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-active { color: var(--neon-lime); position: relative; }
        .nav-active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: var(--neon-lime); border-radius: 10px 10px 0 0; }
        .btn-tap { background: #1e293b; border: 1px solid #334155; min-height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 14px; transition: 0.1s; color: #94a3b8; font-weight: 900; }
        .btn-tap.selected { background: linear-gradient(135deg, #ff007f, #FF8C00); border: none; color: white; box-shadow: 0 4px 12px rgba(255, 0, 127, 0.4); }
        .card-mini { padding: 14px; border-radius: 18px; border: 2px solid #334155; background: #1e293b; text-align: center; }
        .card-mini.selected-mobil { border-color: #06b6d4; background: rgba(6, 182, 212, 0.1); }
        .card-mini.selected-motor { border-color: #f97316; background: rgba(249, 115, 22, 0.1); }

        #toast-notif {
            visibility: hidden; min-width: 280px; background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #39FF14; text-align: center; border-radius: 24px; padding: 20px;
            position: fixed; z-index: 100; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.7);
            font-weight: 900; border: 2px solid #39FF14; box-shadow: 0 0 50px rgba(57, 255, 20, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
        }
        #toast-notif.show { visibility: visible; transform: translate(-50%, -50%) scale(1); opacity: 1; }
    </style>
</head>
<body class="pb-10">

    <div id="toast-notif">
        <div class="text-3xl mb-2">⚡</div>
        <div class="text-sm">SUKSES SINKRON<br>KE CLOUD SERVER</div>
    </div>

    <header class="header-mobile">
        <h1 class="text-5xl font-radja italic">RADJA</h1>
        <p class="text-[8px] tracking-[0.4em] font-black text-white opacity-60 uppercase">Pro Cloud Edition</p>
    </header>

    <nav class="glass-nav sticky top-0 z-50 flex justify-around items-center h-14 shadow-lg text-[10px] font-black uppercase">
        <button onclick="showPage('input')" id="btn-input" class="nav-active flex-1 h-full">Input</button>
        <button onclick="showPage('harian')" id="btn-harian" class="flex-1 h-full text-slate-400">Harian</button>
        <button onclick="showPage('keseluruhan')" id="btn-keseluruhan" class="flex-1 h-full text-slate-400">Statistik</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <section id="page-input" class="space-y-4">
            <input type="hidden" id="edit-id">
            <div class="bg-slate-800/50 p-4 rounded-[2rem] border border-slate-700">
                <div class="flex justify-between items-center mb-3 px-1 text-[9px] font-black uppercase text-cyan-400 tracking-widest">
                    <span>Captain On Duty</span>
                    <input type="datetime-local" id="in-waktu" class="bg-transparent text-slate-400 outline-none">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="pilihPetugas('Saryo')" class="btn-tap petugas-btn text-[11px]" data-nama="Saryo">Saryo</button>
                    <button onclick="pilihPetugas('Rokib')" class="btn-tap petugas-btn text-[11px]" data-nama="Rokib">Rokib</button>
                    <button onclick="pilihPetugas('Lintang')" class="btn-tap petugas-btn text-[11px]" data-nama="Lintang">Lintang</button>
                    <button onclick="pilihPetugas('Petugas 1')" class="btn-tap petugas-btn text-[11px]" data-nama="Petugas 1">P-1</button>
                    <button onclick="pilihPetugas('Petugas 2')" class="btn-tap petugas-btn text-[11px]" data-nama="Petugas 2">P-2</button>
                    <button onclick="pilihPetugas('Petugas 3')" class="btn-tap petugas-btn text-[11px]" data-nama="Petugas 3">P-3</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div onclick="pilihKendaraan('Mobil')" id="card-mobil" class="card-mini active:scale-95">
                    <p class="font-black text-sm uppercase italic text-white">Mobil</p>
                    <p class="text-[9px] text-cyan-400 font-bold">60K</p>
                </div>
                <div onclick="pilihKendaraan('Motor')" id="card-motor" class="card-mini active:scale-95">
                    <p class="font-black text-sm uppercase italic text-white">Motor</p>
                    <p class="text-[9px] text-orange-400 font-bold">15K</p>
                </div>
            </div>

            <div class="bg-slate-900 p-5 rounded-[2rem] border border-slate-700 text-center">
                <div class="flex items-center justify-center">
                    <span class="text-xl font-black text-lime-400 mr-2">Rp</span>
                    <input type="number" inputmode="numeric" id="in-tarif" placeholder="0" class="bg-transparent text-4xl font-black text-white w-32 outline-none">
                </div>
            </div>

            <button onclick="simpanData()" id="btn-save" class="w-full bg-gradient-to-r from-lime-500 to-emerald-600 text-slate-900 font-black py-5 rounded-2xl shadow-lg uppercase tracking-widest text-sm active:scale-95 transition-all">
                Sync ke Cloud
            </button>
        </section>

        <section id="page-harian" class="hidden space-y-3">
            <div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl border-b-2 border-cyan-400">
                <input type="date" id="filter-tgl" onchange="tampilHarian()" class="bg-transparent font-black text-xs text-white outline-none">
                <div class="text-right">
                    <p id="total-harian" class="text-lg font-black text-white">Rp 0</p>
                </div>
            </div>
            <div id="list-harian-mobile"></div>
        </section>

        <section id="page-keseluruhan" class="hidden space-y-4">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-800 p-5 rounded-[2rem] text-white">
                <input type="month" id="filter-bulan" onchange="tampilBulanan()" class="bg-transparent font-black text-lg outline-none mb-1 block w-full">
                <h3 id="total-bulanan" class="text-3xl font-black">Rp 0</h3>
            </div>
            <div id="grid-petugas"></div>
            <button onclick="eksporData()" class="w-full bg-slate-800 text-cyan-400 border border-cyan-400/30 font-black py-4 rounded-2xl text-[10px] uppercase">📊 EKSPOR CSV</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, updateDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // !!! ISI CONFIG ANDA DI SINI !!!
        const firebaseConfig = {
            apiKey: "PASTE_DI_SINI",
            authDomain: "PASTE_DI_SINI",
            projectId: "PASTE_DI_SINI",
            storageBucket: "PASTE_DI_SINI",
            messagingSenderId: "PASTE_DI_SINI",
            appId: "PASTE_DI_SINI"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const transRef = collection(db, "transaksi");

        // TAHAP 1: AKTIFKAN OFFLINE PERSISTENCE
        enableIndexedDbPersistence(db).catch((err) => {
            console.warn("Offline persistence failed", err.code);
        });

        // Global State
        window.petugasTerpilih = "";
        window.kendaraanTerpilih = "";
        window.currentData = [];

        window.simpanData = async () => {
            const tarif = parseInt(document.getElementById('in-tarif').value);
            const editId = document.getElementById('edit-id').value;
            const wkt = document.getElementById('in-waktu').value;
            const btn = document.getElementById('btn-save');

            if(!window.petugasTerpilih || !window.kendaraanTerpilih || isNaN(tarif)) {
                alert("⚠️ Pilih Petugas & Unit!");
                return;
            }

            btn.innerText = "SINKRONISASI...";
            btn.disabled = true;

            const payload = {
                tgl: wkt.split('T')[0],
                jam: wkt.split('T')[1],
                petugas: window.petugasTerpilih,
                kendaraan: window.kendaraanTerpilih,
                tarif: tarif,
                timestamp: Date.now()
            };

            try {
                if(editId) {
                    await updateDoc(doc(db, "transaksi", editId), payload);
                } else {
                    await addDoc(transRef, payload);
                }
                showToast();
                resetForm();
            } catch (e) {
                alert("Gagal koneksi. Data akan disinkron otomatis saat online.");
            } finally {
                btn.innerText = "Sync ke Cloud";
                btn.disabled = false;
            }
        };

        window.tampilHarian = () => {
            const tgl = document.getElementById('filter-tgl').value;
            const q = query(transRef, where("tgl", "==", tgl));
            onSnapshot(q, (snapshot) => {
                let total = 0; let html = "";
                snapshot.forEach((doc) => {
                    const d = doc.data(); total += d.tarif;
                    html += `<div class="bg-slate-800/40 p-3 rounded-xl border border-slate-700 flex justify-between items-center mb-2">
                        <div>
                            <p class="text-[9px] font-black text-pink-500 uppercase">${d.petugas} (${d.jam})</p>
                            <p class="text-xs font-bold text-white">${d.kendaraan} - Rp ${d.tarif.toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="hapus('${doc.id}')" class="text-red-500 bg-red-500/10 w-8 h-8 rounded-lg">✕</button>
                        </div>
                    </div>`;
                });
                document.getElementById('list-harian-mobile').innerHTML = html;
                document.getElementById('total-harian').innerText = "Rp " + total.toLocaleString('id-ID');
            });
        };

        window.tampilBulanan = () => {
            const bln = document.getElementById('filter-bulan').value;
            onSnapshot(transRef, (snapshot) => {
                let total = 0; let rekap = {}; window.currentData = [];
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    if(d.tgl.startsWith(bln)) {
                        window.currentData.push(d); total += d.tarif;
                        if(!rekap[d.petugas]) rekap[d.petugas] = { mobil: 0, motor: 0, totalRp: 0 };
                        d.kendaraan === 'Mobil' ? rekap[d.petugas].mobil++ : rekap[d.petugas].motor++;
                        rekap[d.petugas].totalRp += d.tarif;
                    }
                });
                document.getElementById('total-bulanan').innerText = "Rp " + total.toLocaleString('id-ID');
                document.getElementById('grid-petugas').innerHTML = Object.keys(rekap).map(nama => `
                    <div class="bg-slate-900 p-4 rounded-xl border-l-4 border-slate-700 mb-3">
                        <div class="flex justify-between items-center mb-2">
                            <p class="text-xs font-black text-white uppercase">${nama}</p>
                            <p class="text-sm font-black text-lime-400">Rp ${rekap[nama].totalRp.toLocaleString()}</p>
                        </div>
                        <div class="flex gap-4 border-t border-slate-800 pt-2 text-[10px]">
                            <span class="text-cyan-400">🚗 ${rekap[nama].mobil}</span>
                            <span class="text-orange-400">🛵 ${rekap[nama].motor}</span>
                        </div>
                    </div>`).join('');
            });
        };

        window.hapus = async (id) => { if(confirm('Hapus data?')) await deleteDoc(doc(db, "transaksi", id)); };
        
        function showToast() {
            const t = document.getElementById("toast-notif");
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 2000);
        }

        function resetForm() { 
            window.petugasTerpilih = ""; window.kendaraanTerpilih = ""; 
            document.querySelectorAll('.petugas-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('card-mobil').className = 'card-mini';
            document.getElementById('card-motor').className = 'card-mini';
            document.getElementById('in-tarif').value = '';
            setWaktuSekarang();
        }

        window.showPage = (p) => {
            ['page-input', 'page-harian', 'page-keseluruhan'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['btn-input', 'btn-harian', 'btn-keseluruhan'].forEach(id => document.getElementById(id).classList.remove('nav-active', 'text-slate-400'));
            document.getElementById('page-' + p).classList.remove('hidden');
            document.getElementById('btn-' + p).classList.add('nav-active');
            if(p === 'harian') window.tampilHarian();
            if(p === 'keseluruhan') window.tampilBulanan();
        };

        window.pilihPetugas = (n) => { window.petugasTerpilih = n; document.querySelectorAll('.petugas-btn').forEach(b => b.classList.toggle('selected', b.getAttribute('data-nama') === n)); };
        window.pilihKendaraan = (j) => { window.kendaraanTerpilih = j; document.getElementById('card-mobil').className = 'card-mini ' + (j === 'Mobil' ? 'selected-mobil' : ''); document.getElementById('card-motor').className = 'card-mini ' + (j === 'Motor' ? 'selected-motor' : ''); document.getElementById('in-tarif').value = (j === 'Mobil') ? 60000 : 15000; };
        
        function setWaktuSekarang() { const s = new Date(); const l = new Date(s.getTime() - s.getTimezoneOffset() * 60000).toISOString(); document.getElementById('in-waktu').value = l.slice(0, 16); document.getElementById('filter-tgl').value = l.slice(0, 10); document.getElementById('filter-bulan').value = l.slice(0, 7); }
        setWaktuSekarang();
    </script>
</body>
</html>
